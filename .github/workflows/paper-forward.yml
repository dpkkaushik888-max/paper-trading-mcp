name: S18 Paper Forward

on:
  schedule:
    # Daily at 00:30 UTC — after Binance daily klines close at 00:00 UTC.
    - cron: '30 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

# Prevent concurrent runs (e.g. manual trigger during scheduled run).
concurrency:
  group: paper-forward
  cancel-in-progress: false

jobs:
  paper:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run paper trader (daily)
        run: PYTHONPATH=. python -m trading_engine.paper.run_daily

      - name: Build dashboard
        run: PYTHONPATH=. python scripts/build_dashboard.py

      - name: Update pinned issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: PYTHONPATH=. python scripts/update_issue.py

      - name: Commit journal + dashboard
        run: |
          git config user.name  "S18 Paper Bot"
          git config user.email "bot@paper-forward.local"
          git add state/journal.json docs/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            VALUE=$(python3 -c "import json; j=json.load(open('state/journal.json')); d=j['days'][-1] if j['days'] else {}; print(f\"\${d.get('portfolio_value', j['starting_capital']):.2f}\")")
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "paper-fwd ${DATE}: ${VALUE}"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
